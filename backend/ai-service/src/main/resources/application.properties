# AI Service Application Properties
server.port=8082

# H2 In-Memory Database (dev mode)
spring.datasource.url=jdbc:h2:mem:ai_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Scheduling Configuration
spring.task.scheduling.pool.size=5

# Logging Configuration
logging.level.com.app.ai=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Python ML Model Configuration
python.ml.models.path=../ai-ml/src/
python.ml.notebooks.path=../ai-ml/notebooks/
python.ml.advanced.path=../ai-ml/advanced/